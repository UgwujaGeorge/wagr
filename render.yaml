services:
  - type: web
    name: wagr-relayer
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build -w @wagr/shared && npm run build -w @wagr/relayer
    startCommand: bash relayer/start.sh
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: RELAYER_DATA_FILE
        value: /var/data/.wagr-relayer-data.json
    disk:
      name: wagr-relayer-data
      mountPath: /var/data
      sizeGB: 1
