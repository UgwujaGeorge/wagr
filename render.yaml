databases:
  - name: wagr-relayer-db
    plan: free

services:
  - type: web
    name: wagr-relayer
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build -w @wagr/shared && npm run build -w @wagr/relayer
    startCommand: bash relayer/start.sh
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: wagr-relayer-db
          property: connectionString
